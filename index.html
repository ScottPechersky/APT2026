les/Marketing > Web Advertising/Social Media","website":"","booth":"3345"},{"category":"Sales/Marketing > Web Advertising/Social Media","parent":"Sales/Marketing","vendor":"Digible Inc.","description":"We are a flexible digital marketing solutions for the multifamily industry. Digible offers a wide range of seamless digital solutions into the platforms you already use. Six data sources? Ownership sweating? Tight budget? No problem, we got you.","naaCategories":"Sales/Marketing > Web Advertising/Social Media","website":"","booth":"3549"},{"category":"Sales/Marketing > Web Advertising/Social Media","parent":"Sales/Marketing","vendor":"LocaliQ","description":"Move your business forward with AI-powered digital marketing backed by local expertise. LocaliQ helps businesses attract and retain their ideal customers by combining a powerful platform with a dedicated marketing partner. Reach the right audience, generate quality leads, and make your digital marketing work smarter\u2014and harder\u2014for you.","naaCategories":"Sales/Marketing > Web Advertising/Social Media","website":"","booth":"2158"},{"category":"Sales/Marketing > Web Advertising/Social Media","parent":"Sales/Marketing","vendor":"My City Apartments","description":"My City Apartments is a results-driven digital marketing partner for the multifamily industry. We specialize in proactive strategies that increase property visibility and drive qualified traffic, including Meta advertising, geofencing, website development, and social media management. Our data-focused approach helps communities attract, engage, and convert renters more effectively in an increasingly competitive market.","naaCategories":"Sales/Marketing > Web Advertising/Social Media","website":"","booth":"3457"},{"category":"Sales/Marketing > Web Advertising/Social Media","parent":"Sales/Marketing","vendor":"PERQ","description":"PERQ is a multifamily digital marketing solutions partner that turns owned marketing into a measurable lead and lease engine. By connecting advertising, high-converting websites, interactive lead capture, and portfolio-wide marketing intelligence into one AI-powered system, PERQ helps multifamily marketers generate more qualified leads and leases from their existing marketing investment, while giving leadership clear visibility into performance across the portfolio.\u200b","naaCategories":"Sales/Marketing > Web Advertising/Social Media","website":"","booth":"1801"},{"category":"Sales/Marketing > Web Advertising/Social Media","parent":"Sales/Marketing","vendor":"Repli360","description":"Repli is a global prop-tech company with an all-in-one marketing platform built by rebels at heart    We work with multifamily properties and organizations around the world to help them own their online presence. We\u2019re here to simplify the prospect-to-resident experience, creating and connecting the dots wherever you show up online \u2013 from websites and SEO to ads and beyond.","naaCategories":"Sales/Marketing > Web Advertising/Social Media","website":"","booth":"122"},{"category":"Sales/Marketing > Web Advertising/Social Media","parent":"Sales/Marketing","vendor":"SalesMail by HeartLegacy","description":"SalesMail\u00ae - Video Mail for Multifamily:    The SalesMail app lets you send personalized and branded video messages via email, text message, or your other favorite messaging apps.    Use SalesMail for virtual tours, lead follow-up, employee recruitment, team communications, and so much more.     If you\u2019re looking to add video to your sales and operations strategies, SalesMail is the simplest and most effective app available today!","naaCategories":"Sales/Marketing > Web Advertising/Social Media","website":"","booth":"1946"},{"category":"Sales/Marketing > Web Advertising/Social Media","parent":"Sales/Marketing","vendor":"Twindo","description":"Twindo is a spatial intelligence platform that gives multi-family owners, operators, and their teams accurate, reliable data on every unit and building \u2014 without repeat site visits. Using LiDAR technology built into any iPhone or iPad Pro, Twindo transforms a simple room scan into accurate CAD/BIM files, 2D floor plans, and measurement reports compatible with Revit, AutoCAD, SketchUp, and more.","naaCategories":"Sales/Marketing > Web Advertising/Social Media","website":"","booth":"3411"},{"category":"Sales/Marketing > Web Advertising/Social Media","parent":"Sales/Marketing","vendor":"Zumper","description":"At Zumper, we\u2019re reimagining how people find and lease homes. Our AI-powered platform connects renters with apartment communities while helping properties maximize visibility with solutions for search, SEO, social, and reputation to reach the right renters.","naaCategories":"Sales/Marketing > Web Advertising/Social Media","website":"","booth":"2301"}]</script>
<style>
:root{--navy:#0d1f3c;--gold:#c9a84c;--gold-lt:#f0d98a;--cream:#faf8f3;--slate:#4a5568;--border:#e2e0d8;--radius:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--cream);color:var(--navy);display:flex;flex-direction:column;}
header{background:var(--navy);padding:12px 16px 10px;border-bottom:3px solid var(--gold);flex-shrink:0;}
header h1{color:#fff;font-size:1rem;font-weight:700;line-height:1.2;}
header p{color:var(--gold-lt);font-size:.72rem;margin-top:2px;}
.searchbar{background:#fff;padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;align-items:center;}
.search-input{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:.9rem;outline:none;background:var(--cream);color:var(--navy);-webkit-appearance:none;}
.search-input:focus{border-color:var(--gold);background:#fff;}
.clear-btn{background:none;border:none;color:var(--slate);font-size:1.2rem;padding:4px 6px;cursor:pointer;flex-shrink:0;display:none;line-height:1;}
.filters{background:#fff;border-bottom:1px solid var(--border);padding:8px 12px;flex-shrink:0;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:.75rem;font-weight:600;border:1.5px solid var(--border);background:#fff;color:var(--slate);cursor:pointer;white-space:nowrap;transition:all .15s;}
.chip.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.subcats{display:none;background:#f0f3f8;border-bottom:1px solid var(--border);padding:6px 12px;flex-shrink:0;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.subcats::-webkit-scrollbar{display:none;}
.subcats.open{display:flex;}
.statusbar{background:#f0f3f8;border-bottom:1px solid var(--border);padding:5px 12px;font-size:.72rem;color:var(--slate);flex-shrink:0;display:flex;justify-content:space-between;align-items:center;}
.list-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 10px 80px;}
.vendor-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:8px;padding:11px 13px;position:relative;}
.vendor-card.expanded{border-color:var(--gold);}
.card-header{display:flex;align-items:flex-start;gap:8px;cursor:pointer;}
.vendor-name{font-size:.92rem;font-weight:700;color:var(--navy);line-height:1.3;flex:1;}
.booth-tag{flex-shrink:0;background:var(--navy);color:#fff;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.04em;margin-top:1px;}
.cat-pill{display:inline-block;margin-top:5px;padding:2px 9px;border-radius:20px;font-size:.68rem;font-weight:600;white-space:nowrap;max-width:calc(100% - 24px);overflow:hidden;text-overflow:ellipsis;}
.chevron{position:absolute;right:13px;top:13px;color:var(--border);font-size:.75rem;pointer-events:none;transition:transform .2s;}
.vendor-card.expanded .chevron{transform:rotate(180deg);color:var(--gold);}
.card-body{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.vendor-card.expanded .card-body{display:block;}
.card-desc{font-size:.82rem;color:var(--slate);line-height:1.55;}
.note-label{font-size:.65rem;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 4px;}
.note-input{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:.82rem;color:var(--navy);background:var(--cream);resize:none;height:52px;font-family:inherit;outline:none;display:block;}
.note-input:focus{border-color:var(--gold);}
.fab{position:fixed;bottom:20px;right:16px;background:var(--gold);color:var(--navy);border:none;border-radius:28px;padding:11px 18px;font-size:.82rem;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.2);cursor:pointer;z-index:100;}
.fab:active{transform:scale(.96);}
.empty{text-align:center;padding:48px 20px;color:var(--slate);}
.empty h2{font-size:1.1rem;color:var(--navy);margin-bottom:6px;}
</style>
</head>
<body>
<header>
  <h1>NAA Apartmentalize 2026</h1>
  <p>Exhibitor Directory &mdash; ECL Prop Solutions</p>
</header>
<div class="searchbar">
  <input class="search-input" id="searchInput" type="search"
    placeholder="Search vendor, booth #, keyword..."
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <button class="clear-btn" id="clearBtn" onclick="clearSearch()">&times;</button>
</div>
<div class="filters" id="parentFilters">
  <button class="chip active" onclick="setParent(this, '')">All</button>
  <button class="chip" onclick="setParent(this, 'Construction')">Construction</button>
  <button class="chip" onclick="setParent(this, 'Financial Services')">Financial</button>
  <button class="chip" onclick="setParent(this, 'Maintenance')">Maintenance</button>
  <button class="chip" onclick="setParent(this, 'Operations')">Operations</button>
  <button class="chip" onclick="setParent(this, 'Resident Services')">Resident Svcs</button>
  <button class="chip" onclick="setParent(this, 'Sales/Marketing')">Sales/Mktg</button>
</div>
<div class="subcats" id="subcatPanel"></div>
<div class="statusbar">
  <span id="statusText">Loading...</span>
  <span id="statusRight" style="font-weight:600;color:var(--navy)"></span>
</div>
<div class="list-wrap" id="listWrap"></div>
<button class="fab" onclick="exportCSV()">&#x21E9;&nbsp;Export CSV</button>
<script>
"use strict";

var ALL_VENDORS = JSON.parse(document.getElementById('vendorData').textContent);

var COLORS = {
  'Construction':       ['#7b3f00','#fff'],
  'Financial Services': ['#0d1f3c','#fff'],
  'Maintenance':        ['#1a5276','#fff'],
  'Operations':         ['#2d7a4f','#fff'],
  'Resident Services':  ['#6c3483','#fff'],
  'Sales/Marketing':    ['#b7410e','#fff']
};

var query = '';
var activeParent = '';
var activeSubcat = '';
var filtered = [];
var expanded = {};
var notes = {};
try { notes = JSON.parse(localStorage.getItem('apt26_notes') || '{}'); } catch(e) {}

function saveNote(el) {
  var vendor = el.getAttribute('data-vendor');
  notes[vendor] = el.value;
  try { localStorage.setItem('apt26_notes', JSON.stringify(notes)); } catch(e) {}
  updateNoteCount();
}

function updateNoteCount() {
  var n = Object.keys(notes).filter(function(k) { return notes[k] && notes[k].trim(); }).length;
  document.getElementById('statusRight').textContent = n ? n + ' noted' : '';
}

function setParent(el, p) {
  activeParent = p;
  activeSubcat = '';
  document.querySelectorAll('#parentFilters .chip').forEach(function(c) { c.classList.remove('active'); });
  el.classList.add('active');
  buildSubcats();
  render();
}

function buildSubcats() {
  var panel = document.getElementById('subcatPanel');
  if (!activeParent) {
    panel.classList.remove('open');
    panel.innerHTML = '';
    return;
  }
  var seen = {};
  var subs = [];
  ALL_VENDORS.forEach(function(v) {
    if (v.parent !== activeParent) return;
    var s = v.category.indexOf(' > ') !== -1 ? v.category.split(' > ')[1] : v.category;
    if (!seen[s]) { seen[s] = true; subs.push(s); }
  });
  subs.sort();

  // Build buttons using createElement — zero HTML string interpolation
  panel.innerHTML = '';
  var allBtn = document.createElement('button');
  allBtn.className = 'chip active';
  allBtn.setAttribute('data-s', '');
  allBtn.textContent = 'All ' + activeParent;
  allBtn.addEventListener('click', function() { pickSub(this); });
  panel.appendChild(allBtn);

  subs.forEach(function(s) {
    var btn = document.createElement('button');
    btn.className = 'chip';
    btn.setAttribute('data-s', s);
    btn.textContent = s;
    btn.addEventListener('click', function() { pickSub(this); });
    panel.appendChild(btn);
  });

  panel.classList.add('open');
}

function pickSub(el) {
  activeSubcat = el.getAttribute('data-s');
  document.querySelectorAll('#subcatPanel .chip').forEach(function(c) { c.classList.remove('active'); });
  el.classList.add('active');
  render();
}

document.getElementById('searchInput').addEventListener('input', function() {
  query = this.value.toLowerCase();
  document.getElementById('clearBtn').style.display = query ? 'block' : 'none';
  render();
});

function clearSearch() {
  query = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  render();
}

function getSub(v) {
  return v.category.indexOf(' > ') !== -1 ? v.category.split(' > ')[1] : v.category;
}

function render() {
  filtered = ALL_VENDORS.filter(function(v) {
    if (activeParent && v.parent !== activeParent) return false;
    if (activeSubcat && getSub(v) !== activeSubcat) return false;
    if (query) {
      var hay = [v.vendor, v.description, v.category, v.booth, notes[v.vendor] || ''].join(' ').toLowerCase();
      return hay.indexOf(query) !== -1;
    }
    return true;
  });

  var total = ALL_VENDORS.length;
  document.getElementById('statusText').textContent =
    (query || activeParent || activeSubcat)
      ? filtered.length + ' of ' + total + ' vendors'
      : total + ' vendors \u00b7 6 categories';
  updateNoteCount();

  var wrap = document.getElementById('listWrap');
  if (filtered.length === 0) {
    wrap.innerHTML = '<div class=\'empty\'><h2>No Results</h2><p>Try a different search or clear the filter.</p></div>';
    return;
  }

  // Build cards using createElement — no HTML string interpolation of vendor data
  var frag = document.createDocumentFragment();

  for (var i = 0; i < filtered.length; i++) {
    var v = filtered[i];
    var sub = getSub(v);
    var c = COLORS[v.parent] || ['#555','#fff'];
    var isX = expanded[v.vendor] === true;
    var note = notes[v.vendor] || '';

    var card = document.createElement('div');
    card.className = 'vendor-card' + (isX ? ' expanded' : '');
    card.id = 'vc' + i;

    // Chevron
    var chev = document.createElement('span');
    chev.className = 'chevron';
    chev.textContent = '\u25BC';
    card.appendChild(chev);

    // Header (clickable)
    var header = document.createElement('div');
    header.className = 'card-header';
    header.setAttribute('data-i', i);
    header.addEventListener('click', handleToggle);

    var nameWrap = document.createElement('div');
    var nameEl = document.createElement('div');
    nameEl.className = 'vendor-name';
    nameEl.textContent = v.vendor;
    nameWrap.appendChild(nameEl);

    var pill = document.createElement('span');
    pill.className = 'cat-pill';
    pill.style.background = c[0];
    pill.style.color = c[1];
    pill.textContent = sub;
    nameWrap.appendChild(pill);
    header.appendChild(nameWrap);

    if (v.booth) {
      var boothEl = document.createElement('span');
      boothEl.className = 'booth-tag';
      boothEl.textContent = '# ' + v.booth;
      header.appendChild(boothEl);
    }
    card.appendChild(header);

    // Body (expanded content)
    var body = document.createElement('div');
    body.className = 'card-body';

    var descEl = document.createElement('div');
    descEl.className = 'card-desc';
    if (v.description) {
      descEl.textContent = v.description.length > 420 ? v.description.substring(0, 420) + '\u2026' : v.description;
    } else {
      var em = document.createElement('em');
      em.style.color = '#bbb';
      em.textContent = 'No description available';
      descEl.appendChild(em);
    }
    body.appendChild(descEl);

    var noteLabel = document.createElement('div');
    noteLabel.className = 'note-label';
    noteLabel.textContent = 'My Notes';
    body.appendChild(noteLabel);

    var textarea = document.createElement('textarea');
    textarea.className = 'note-input';
    textarea.setAttribute('data-vendor', v.vendor);
    textarea.placeholder = 'Add notes about this vendor...';
    textarea.value = note;
    textarea.addEventListener('click', function(e) { e.stopPropagation(); });
    textarea.addEventListener('change', function() { saveNote(this); });
    body.appendChild(textarea);

    card.appendChild(body);
    frag.appendChild(card);
  }

  wrap.innerHTML = '';
  wrap.appendChild(frag);
}

function handleToggle(e) {
  var i = parseInt(this.getAttribute('data-i'), 10);
  var v = filtered[i];
  if (!v) return;
  var card = document.getElementById('vc' + i);
  if (!card) return;
  if (expanded[v.vendor]) {
    expanded[v.vendor] = false;
    card.classList.remove('expanded');
  } else {
    expanded[v.vendor] = true;
    card.classList.add('expanded');
  }
}

function exportCSV() {
  var src = (query || activeParent || activeSubcat) ? filtered : ALL_VENDORS;
  var rows = [['Category','Vendor','Description','Booth','Notes']];
  src.forEach(function(v) {
    rows.push([v.category, v.vendor, v.description || '', v.booth || '', notes[v.vendor] || '']);
  });
  var csv = rows.map(function(r) {
    return r.map(function(x) { return '"' + String(x).replace(/"/g, '""') + '"'; }).join(',');
  }).join('\n');
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
  a.download = 'APT26_Exhibitors.csv';
  a.click();
}

render();
</script>
</body>
</html>
